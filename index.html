<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StudiBudi — Temukan Teman Belajar</title>
<style>
  /* ── Design tokens ── */
  :root {
    --bg:        #0f1117;
    --surface:   #181c27;
    --panel:     #1e2334;
    --border:    #2a3050;
    --accent:    #4f8ef7;
    --accent2:   #7c5cfc;
    --success:   #34d399;
    --warn:      #fbbf24;
    --danger:    #f87171;
    --text:      #e4e8f5;
    --muted:     #7a84a3;
    --bubble-me: #1e3a6e;
    --bubble-them: #232a40;
    --font-ui:   'Inter', 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    --radius:    10px;
    --transition: 0.18s ease;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Login screen ── */
  #login-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 60% 40%, #1a2a5e55 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, #2d1b6955 0%, transparent 55%),
                var(--bg);
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 40px 44px 36px;
    width: 380px;
    box-shadow: 0 24px 64px #00000055;
  }

  .login-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }

  .login-logo .icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: grid; place-items: center;
    font-size: 20px;
  }

  .login-logo h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
  .login-logo span { color: var(--accent); }

  .login-tagline {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
  .field input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color var(--transition);
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); }

  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius);
    color: #fff;
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 600;
    padding: 11px;
    margin-top: 6px;
    transition: opacity var(--transition), transform var(--transition);
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  #login-status {
    font-size: 12px;
    margin-top: 12px;
    min-height: 18px;
    text-align: center;
    color: var(--muted);
  }
  #login-status.error { color: var(--danger); }
  #login-status.ok    { color: var(--success); }

  /* ── App layout ── */
  #app {
    display: none;
    flex: 1;
    overflow: hidden;
  }
  #app.active { display: flex; }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sidebar-logo {
    display: flex; align-items: center; gap: 8px; flex: 1;
  }
  .sidebar-logo .icon {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: grid; place-items: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .sidebar-logo span { font-weight: 700; font-size: 15px; }

  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background var(--transition);
  }
  .conn-dot.connected { background: var(--success); box-shadow: 0 0 6px var(--success)44; }

  /* Me card */
  .me-card {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .me-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .me-status {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .me-status-edit {
    display: flex; align-items: center; gap: 6px; margin-top: 6px;
  }
  .me-status-edit input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 11px;
    padding: 4px 8px;
    outline: none;
    font-family: var(--font-ui);
  }
  .me-status-edit input:focus { border-color: var(--accent); }
  .me-status-edit button {
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    font-size: 11px;
    padding: 4px 8px;
  }

  /* Sidebar sections */
  .sidebar-section {
    padding: 10px 16px 4px;
  }
  .sidebar-section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-section-title button {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 2px;
  }

  .room-item, .user-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: background var(--transition);
    margin-bottom: 1px;
  }
  .room-item:hover, .user-item:hover { background: var(--panel); }
  .room-item.active { background: #1e3a6e; color: var(--accent); }

  .room-icon {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: var(--panel);
    display: grid; place-items: center;
    font-size: 11px;
    flex-shrink: 0;
  }
  .room-item.active .room-icon { background: #254e99; }

  .room-meta { flex: 1; min-width: 0; }
  .room-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .room-topic { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .room-item.active .room-topic { color: #89aff5; }

  .room-badge {
    font-size: 10px;
    background: var(--border);
    border-radius: 10px;
    padding: 1px 6px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .user-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success);
    flex-shrink: 0;
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name-text { font-weight: 600; font-size: 12px; }
  .user-status-text { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .sidebar-scroll {
    overflow-y: auto;
    flex: 1;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* ── Main area ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .chat-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .chat-room-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent)33, var(--accent2)33);
    border: 1px solid var(--accent)44;
    display: grid; place-items: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .chat-room-info { flex: 1; }
  .chat-room-name { font-size: 15px; font-weight: 700; }
  .chat-room-topic { font-size: 12px; color: var(--muted); }

  .header-actions { display: flex; gap: 8px; }
  .header-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    padding: 6px 12px;
    transition: all var(--transition);
    font-family: var(--font-ui);
  }
  .header-btn:hover { background: var(--border); color: var(--text); }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg-group { display: flex; flex-direction: column; margin-top: 12px; }
  .msg-group:first-child { margin-top: 0; }

  .msg-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .msg-row.me { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: grid; place-items: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    align-self: flex-end;
    color: #fff;
  }

  .msg-bubble {
    max-width: 65%;
    background: var(--bubble-them);
    border-radius: 14px 14px 14px 4px;
    padding: 9px 14px;
    font-size: 13.5px;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg-row.me .msg-bubble {
    background: var(--bubble-me);
    border-radius: 14px 14px 4px 14px;
  }

  .msg-sender {
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 3px;
    padding: 0 2px;
  }
  .msg-row.me .msg-sender { text-align: right; color: #89aff5; }

  .msg-ts {
    font-size: 9px;
    color: var(--muted);
    margin-top: 3px;
    padding: 0 4px;
  }
  .msg-row.me .msg-ts { text-align: right; }

  /* System messages */
  .msg-system {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 6px 16px;
    background: var(--surface);
    border-radius: 20px;
    margin: 8px auto;
    max-width: 80%;
    border: 1px solid var(--border);
    white-space: pre-line;
    line-height: 1.6;
  }

  /* Status broadcast */
  .msg-status-broadcast {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #1a2a1a;
    border: 1px solid #34d39933;
    border-radius: var(--radius);
    padding: 10px 14px;
    margin: 8px 0;
  }
  .msg-status-broadcast .sb-icon { font-size: 18px; }
  .msg-status-broadcast .sb-text { font-size: 12px; color: var(--success); line-height: 1.4; }
  .msg-status-broadcast .sb-user { font-weight: 700; }

  /* PM */
  .msg-pm {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: #2a1a3a;
    border: 1px solid var(--accent2)44;
    border-radius: var(--radius);
    padding: 10px 14px;
    margin: 6px 0;
  }
  .msg-pm .pm-icon { font-size: 16px; }
  .msg-pm .pm-text { font-size: 12.5px; color: #c4b0f0; line-height: 1.5; }
  .msg-pm .pm-sender { font-weight: 700; color: var(--accent2); }

  /* History msg */
  .msg-history {
    opacity: 0.6;
    font-style: italic;
  }

  /* ── Input bar ── */
  .input-bar {
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
  }

  #msg-input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    resize: none;
    max-height: 100px;
    transition: border-color var(--transition);
  }
  #msg-input:focus { border-color: var(--accent); }
  #msg-input::placeholder { color: var(--muted); }

  .send-btn {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius);
    color: #fff;
    cursor: pointer;
    display: grid; place-items: center;
    font-size: 16px;
    transition: opacity var(--transition), transform var(--transition);
    flex-shrink: 0;
  }
  .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.96); }

  /* ── Create room modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: #00000088;
    display: none;
    place-items: center;
    z-index: 100;
  }
  .modal-overlay.open { display: grid; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 32px;
    width: 360px;
    box-shadow: 0 20px 60px #00000077;
  }
  .modal h2 { font-size: 16px; margin-bottom: 20px; }
  .modal .field { margin-bottom: 14px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-secondary {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 13px;
    padding: 9px;
  }
  .btn-secondary:hover { background: var(--border); }
  .modal .btn-primary { flex: 1; margin-top: 0; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .sidebar { width: 220px; min-width: 220px; }
  }
</style>
</head>
<body>

<!-- ── Login ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">📚</div>
      <h1>Studi<span>Budi</span></h1>
    </div>
    <p class="login-tagline">Temukan teman belajar secara real-time.<br>Broadcast topikmu, join diskusi, belajar bareng.</p>
    <div class="field">
      <label>Username</label>
      <input id="login-user" type="text" placeholder="Masukkan username" autocomplete="username"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input id="login-pass" type="password" placeholder="Masukkan password" autocomplete="current-password"/>
    </div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Masuk / Daftar</button>
    <div id="login-status">Akun baru akan dibuat otomatis saat pertama kali login.</div>
  </div>
</div>

<!-- ── App ── -->
<div id="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="icon">📚</div>
        <span>StudiBudi</span>
      </div>
      <div class="conn-dot" id="conn-dot"></div>
    </div>

    <!-- Me -->
    <div class="me-card">
      <div class="me-name" id="me-name">—</div>
      <div class="me-status" id="me-status-display">Belum set status belajar</div>
      <div class="me-status-edit">
        <input id="status-input" type="text" placeholder="Lagi belajar apa? (Enter)"/>
        <button onclick="sendStatus()">✓</button>
      </div>
    </div>

    <div class="sidebar-scroll">
      <!-- Rooms -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">
          Ruang Belajar
          <button title="Buat room baru" onclick="openCreateModal()">＋</button>
        </div>
        <div id="room-list"></div>
      </div>

      <!-- Online users -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">Online Sekarang</div>
        <div id="user-list"></div>
      </div>
    </div>
  </div>

  <!-- Main chat -->
  <div class="main">
    <div class="chat-header">
      <div class="chat-room-icon" id="room-icon">🏠</div>
      <div class="chat-room-info">
        <div class="chat-room-name" id="room-name-display">#lobby</div>
        <div class="chat-room-topic" id="room-topic-display">Hangout umum</div>
      </div>
      <div class="header-actions">
        <button class="header-btn" onclick="sendCmd('/rooms')">🔄 Refresh</button>
        <button class="header-btn" onclick="sendCmd('/online')">👥 Online</button>
        <button class="header-btn" id="leave-btn" onclick="leaveRoom()" style="display:none">← Tinggalkan</button>
      </div>
    </div>

    <div id="messages"></div>

    <div class="input-bar">
      <textarea id="msg-input" rows="1" placeholder="Ketik pesan atau /help untuk daftar perintah…"></textarea>
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<!-- Create room modal -->
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <h2>📖 Buat Ruang Belajar</h2>
    <div class="field">
      <label>Nama Room</label>
      <input id="new-room-name" type="text" placeholder="contoh: algoritma-2025" style="width:100%;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font-ui);font-size:14px;padding:10px 14px;outline:none;"/>
    </div>
    <div class="field">
      <label>Topik</label>
      <input id="new-room-topic" type="text" placeholder="contoh: Belajar Sorting Algorithm" style="width:100%;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font-ui);font-size:14px;padding:10px 14px;outline:none;"/>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeCreateModal()">Batal</button>
      <button class="btn-primary" onclick="createRoom()">Buat Room</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let ws = null;
let myUsername = '';
let currentRoom = 'lobby';
let onlineUsers = {};    // username -> status
let rooms = [];          // [{name, members, topic}]
let authState = 'idle';  // 'idle' | 'username' | 'password' | 'done'
const WS_URL = `ws://${location.hostname}:8765`;

// ── Login flow ─────────────────────────────────────────────────────────
function setLoginStatus(msg, cls = '') {
  const el = document.getElementById('login-status');
  el.textContent = msg;
  el.className = cls;
}

function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  if (!user || !pass) { setLoginStatus('Username dan password wajib diisi.', 'error'); return; }

  document.getElementById('login-btn').disabled = true;
  setLoginStatus('Menghubungkan ke server…');

  myUsername = user;
  ws = new WebSocket(WS_URL);
  authState = 'idle';

  ws.onopen = () => {
    setLoginStatus('Terhubung. Melakukan autentikasi…', 'ok');
  };

  ws.onmessage = (ev) => {
    const pkt = JSON.parse(ev.data);
    const t = pkt.type;
    const text = pkt.payload?.text || '';

    if (authState === 'idle' && t === 'prompt' && text.toLowerCase().includes('username')) {
      authState = 'username';
      sendRaw(user);
      return;
    }
    if (authState === 'username' && t === 'prompt' && text.toLowerCase().includes('password')) {
      authState = 'password';
      sendRaw(pass);
      return;
    }
    if (authState === 'password') {
      if (text.includes('ERROR')) {
        setLoginStatus(text, 'error');
        document.getElementById('login-btn').disabled = false;
        ws.close();
        return;
      }
      // auth success
      authState = 'done';
      setLoginStatus(text, 'ok');
      setTimeout(enterApp, 600);
      return;
    }
  };

  ws.onerror = () => {
    setLoginStatus('Gagal terhubung ke server. Pastikan server berjalan.', 'error');
    document.getElementById('login-btn').disabled = false;
  };
}

function enterApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('me-name').textContent = myUsername;
  document.getElementById('conn-dot').classList.add('connected');

  // Re-bind ws.onmessage for chat
  ws.onmessage = handleMessage;
  ws.onclose = () => {
    document.getElementById('conn-dot').classList.remove('connected');
    appendSystem('❌ Terputus dari server.');
  };

  // Request room list
  sendCmd('/rooms');
  sendCmd('/online');
}

// ── WebSocket helpers ──────────────────────────────────────────────────
function sendRaw(text) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'input', payload: { text } }) + '\n');
  }
}
function sendCmd(cmd) { sendRaw(cmd); }

// ── Message handler ────────────────────────────────────────────────────
function handleMessage(ev) {
  let pkt;
  try { pkt = JSON.parse(ev.data); } catch { return; }

  const t = pkt.type;
  const payload = pkt.payload || {};

  if (t === 'system') {
    const txt = payload.text || '';
    // Intercept join/leave confirmations to update header
    if (txt.startsWith('Joined room') || txt.startsWith('Left ')) {
      const match = txt.match(/Joined room '(.+?)'/);
      if (match) setCurrentRoom(match[1]);
      else if (txt.includes('lobby')) setCurrentRoom('lobby');
    }
    appendSystem(txt);
    // refresh after join/leave
    if (txt.includes('Joined') || txt.includes('Left')) {
      sendCmd('/rooms');
    }
  } else if (t === 'chat') {
    const sender = pkt.sender || payload.sender;
    const text   = payload.text || '';
    const ts     = pkt.timestamp || payload.timestamp || '';
    const room   = pkt.room || payload.room || currentRoom;
    appendChat(sender, text, ts, sender === myUsername);
  } else if (t === 'history') {
    const sender = payload.sender;
    const text   = payload.text;
    const ts     = payload.timestamp;
    appendChatHistory(sender, text, ts);
  } else if (t === 'pm') {
    const sender = payload.sender;
    const text   = payload.text;
    const ts     = payload.timestamp || '';
    appendPM(sender, text, ts);
  } else if (t === 'rooms') {
    rooms = payload.rooms || [];
    renderRooms();
  } else if (t === 'status_update') {
    const uname  = payload.username;
    const status = payload.status;
    const ts     = payload.timestamp || '';
    onlineUsers[uname] = status;
    renderUsers();
    appendStatusBroadcast(uname, status, ts);
    if (uname === myUsername) {
      document.getElementById('me-status-display').textContent = '📚 ' + status;
    }
  }
}

// ── Rendering helpers ──────────────────────────────────────────────────
const messagesEl = document.getElementById('messages');

function scrollBottom() {
  setTimeout(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }, 10);
}

function appendSystem(text) {
  const div = document.createElement('div');
  div.className = 'msg-system';
  div.textContent = text;
  messagesEl.appendChild(div);
  scrollBottom();
}

function appendChat(sender, text, ts, isMe) {
  const group = document.createElement('div');
  group.className = 'msg-group';

  const senderEl = document.createElement('div');
  senderEl.className = 'msg-sender';
  senderEl.textContent = isMe ? 'Kamu' : sender;

  const row = document.createElement('div');
  row.className = 'msg-row' + (isMe ? ' me' : '');

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = (sender || '?')[0].toUpperCase();
  if (isMe) {
    avatar.style.background = 'linear-gradient(135deg,#4f8ef7,#7c5cfc)';
  } else {
    // deterministic color per user
    const colors = ['#e74c3c','#e67e22','#2ecc71','#1abc9c','#9b59b6','#3498db'];
    const idx = [...sender].reduce((a,c)=>a+c.charCodeAt(0),0) % colors.length;
    avatar.style.background = colors[idx];
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;

  const tsEl = document.createElement('div');
  tsEl.className = 'msg-ts';
  tsEl.textContent = ts ? ts.slice(11,16) : '';

  row.appendChild(avatar);
  const wrap = document.createElement('div');
  wrap.appendChild(bubble);
  wrap.appendChild(tsEl);
  row.appendChild(wrap);

  group.appendChild(senderEl);
  group.appendChild(row);
  messagesEl.appendChild(group);
  scrollBottom();
}

function appendChatHistory(sender, text, ts) {
  const group = document.createElement('div');
  group.className = 'msg-group';

  const row = document.createElement('div');
  row.className = 'msg-row msg-history';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.style.opacity = '0.5';
  avatar.textContent = (sender||'?')[0].toUpperCase();

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.style.opacity = '0.6';
  bubble.textContent = text;

  const tsEl = document.createElement('div');
  tsEl.className = 'msg-ts';
  tsEl.textContent = (ts ? ts.slice(11,16) : '') + ' · riwayat';

  row.appendChild(avatar);
  const wrap = document.createElement('div');
  wrap.appendChild(bubble);
  wrap.appendChild(tsEl);
  row.appendChild(wrap);

  group.appendChild(row);
  messagesEl.appendChild(group);
  scrollBottom();
}

function appendStatusBroadcast(uname, status, ts) {
  const div = document.createElement('div');
  div.className = 'msg-status-broadcast';
  div.innerHTML = `
    <span class="sb-icon">📚</span>
    <span class="sb-text"><span class="sb-user">${esc(uname)}</span> sekarang belajar: <strong>${esc(status)}</strong></span>
  `;
  messagesEl.appendChild(div);
  scrollBottom();
}

function appendPM(sender, text, ts) {
  const div = document.createElement('div');
  div.className = 'msg-pm';
  div.innerHTML = `
    <span class="pm-icon">💬</span>
    <span class="pm-text"><span class="pm-sender">${esc(sender)}</span> (pesan pribadi): ${esc(text)}</span>
  `;
  messagesEl.appendChild(div);
  scrollBottom();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Sidebar renders ────────────────────────────────────────────────────
function renderRooms() {
  const el = document.getElementById('room-list');
  el.innerHTML = '';
  rooms.forEach(r => {
    const div = document.createElement('div');
    div.className = 'room-item' + (r.name === currentRoom ? ' active' : '');
    div.innerHTML = `
      <div class="room-icon">#</div>
      <div class="room-meta">
        <div class="room-name">${esc(r.name)}</div>
        <div class="room-topic">${esc(r.topic || '-')}</div>
      </div>
      <div class="room-badge">${r.members}</div>
    `;
    div.onclick = () => joinRoom(r.name);
    el.appendChild(div);
  });
}

function renderUsers() {
  const el = document.getElementById('user-list');
  el.innerHTML = '';
  Object.entries(onlineUsers).forEach(([u, s]) => {
    const div = document.createElement('div');
    div.className = 'user-item';
    div.innerHTML = `
      <div class="user-dot"></div>
      <div class="user-info">
        <div class="user-name-text">${esc(u)}${u===myUsername?' (kamu)':''}</div>
        <div class="user-status-text">${esc(s||'(no status)')}</div>
      </div>
    `;
    el.appendChild(div);
  });
}

// ── Actions ───────────────────────────────────────────────────────────
function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  sendRaw(text);
  input.value = '';
  input.style.height = 'auto';
}

function sendStatus() {
  const input = document.getElementById('status-input');
  const text = input.value.trim();
  if (!text) return;
  sendCmd('/status ' + text);
  input.value = '';
}

function joinRoom(name) {
  if (name === currentRoom) return;
  sendCmd('/join ' + name);
}

function leaveRoom() {
  sendCmd('/leave');
}

function setCurrentRoom(name) {
  currentRoom = name;
  const room = rooms.find(r => r.name === name) || { name, topic: '' };
  document.getElementById('room-name-display').textContent = '#' + name;
  document.getElementById('room-topic-display').textContent = room.topic || '';
  document.getElementById('leave-btn').style.display = name === 'lobby' ? 'none' : '';
  document.getElementById('room-icon').textContent = name === 'lobby' ? '🏠' : '📖';
  renderRooms();
}

// Create modal
function openCreateModal() { document.getElementById('create-modal').classList.add('open'); }
function closeCreateModal() { document.getElementById('create-modal').classList.remove('open'); }
function createRoom() {
  const name  = document.getElementById('new-room-name').value.trim().toLowerCase().replace(/\s+/g,'-');
  const topic = document.getElementById('new-room-topic').value.trim();
  if (!name || !topic) return;
  sendCmd(`/create ${name} ${topic}`);
  closeCreateModal();
  document.getElementById('new-room-name').value = '';
  document.getElementById('new-room-topic').value = '';
  setTimeout(() => sendCmd('/rooms'), 400);
}

// ── Keyboard shortcuts ─────────────────────────────────────────────────
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
document.getElementById('status-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendStatus();
});
document.getElementById('login-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('login-user').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-pass').focus();
});
</script>
