<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StudiBudi — Temukan Teman Belajar</title>
<link rel="icon" type="image/png" href="assets/studibudi-favicon.png"/>
<script>
  (() => {
    const savedTheme = localStorage.getItem('studibudiTheme');
    const preferredTheme = window.matchMedia?.('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    document.documentElement.dataset.theme = savedTheme || preferredTheme;
  })();
</script>
<style>
  /* ── Design tokens ── */
  :root {
    color-scheme: dark;
    --bg:          #0f1117;
    --surface:     #181c27;
    --panel:       #1e2334;
    --border:      #2a3050;
    --accent:      #4f8ef7;
    --accent2:     #7c5cfc;
    --accent-soft: #1e3a6e;
    --accent-mid:  #254e99;
    --accent-text: #89aff5;
    --success:     #34d399;
    --warn:        #fbbf24;
    --danger:      #f87171;
    --text:        #e4e8f5;
    --muted:       #7a84a3;
    --bubble-me:   #1e3a6e;
    --bubble-them: #232a40;
    --status-bg:   #1a2a1a;
    --status-border:#34d39933;
    --pm-bg:       #2a1a3a;
    --pm-text:     #c4b0f0;
    --glass:       #ffffff12;
    --glass-border:#ffffff26;
    --overlay:     #00000088;
    --shadow:      #00000055;
    --login-glow-1:#1a2a5e55;
    --login-glow-2:#2d1b6955;
    --font-ui:     'Inter', 'Segoe UI', system-ui, sans-serif;
    --font-mono:   'JetBrains Mono', 'Fira Code', monospace;
    --radius:      10px;
    --transition:  0.18s ease;
  }

  :root[data-theme="light"] {
    color-scheme: light;
    --bg:          #f7f1e4;
    --surface:     #fffaf0;
    --panel:       #f3e5c4;
    --border:      #d7bd82;
    --accent:      #e1a815;
    --accent2:     #8a5724;
    --accent-soft: #f6dfa0;
    --accent-mid:  #e6bd52;
    --accent-text: #714514;
    --success:     #3f8b5d;
    --warn:        #b8790b;
    --danger:      #b84335;
    --text:        #3b2918;
    --muted:       #806c55;
    --bubble-me:   #f2c75c;
    --bubble-them: #efe1c3;
    --status-bg:   #eef5df;
    --status-border:#6d9a4938;
    --pm-bg:       #f3e4ce;
    --pm-text:     #70451e;
    --glass:       #7c53100d;
    --glass-border:#8d681f33;
    --overlay:     #4a341c66;
    --shadow:      #5c3b1a26;
    --login-glow-1:#f6c94b55;
    --login-glow-2:#a9692e33;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Login screen ── */
  #login-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 60% 40%, var(--login-glow-1) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, var(--login-glow-2) 0%, transparent 55%),
                var(--bg);
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 40px 44px 36px;
    width: 380px;
    box-shadow: 0 24px 64px var(--shadow);
  }

  .login-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }

  .login-logo .icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: grid; place-items: center;
    font-size: 20px;
  }

  .login-logo h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
  .login-logo span { color: var(--accent); }

  .login-tagline {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
  .field input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color var(--transition);
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); }

  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius);
    color: #fff;
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 600;
    padding: 11px;
    margin-top: 6px;
    transition: opacity var(--transition), transform var(--transition);
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  #login-status {
    font-size: 12px;
    margin-top: 12px;
    min-height: 18px;
    text-align: center;
    color: var(--muted);
  }
  #login-status.error { color: var(--danger); }
  #login-status.ok    { color: var(--success); }

  /* ── App layout ── */
  #app {
    display: none;
    flex: 1;
    overflow: hidden;
  }
  #app.active { display: flex; }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sidebar-logo {
    display: flex; align-items: center; gap: 8px; flex: 1;
  }
  .sidebar-logo .icon {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: grid; place-items: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .sidebar-logo span { font-weight: 700; font-size: 15px; }

  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background var(--transition);
  }
  .conn-dot.connected { background: var(--success); box-shadow: 0 0 6px var(--success)44; }

  /* Me card */
  .me-card {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .me-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .me-status {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .me-status-edit {
    display: flex; align-items: center; gap: 6px; margin-top: 6px;
  }
  .me-status-edit input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 11px;
    padding: 4px 8px;
    outline: none;
    font-family: var(--font-ui);
  }
  .me-status-edit input:focus { border-color: var(--accent); }
  .me-status-edit button {
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    font-size: 11px;
    padding: 4px 8px;
  }

  /* Sidebar sections */
  .sidebar-section {
    padding: 10px 16px 4px;
  }
  .sidebar-section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-section-title button {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 2px;
  }

  .room-item, .user-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: background var(--transition);
    margin-bottom: 1px;
  }
  .room-item:hover, .user-item:hover { background: var(--panel); }
  .room-item.active { background: var(--accent-soft); color: var(--accent-text); }

  .room-icon {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: var(--panel);
    display: grid; place-items: center;
    font-size: 11px;
    flex-shrink: 0;
  }
  .room-item.active .room-icon { background: var(--accent-mid); }

  .room-meta { flex: 1; min-width: 0; }
  .room-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .room-topic { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .room-item.active .room-topic { color: var(--accent-text); }

  .room-badge {
    font-size: 10px;
    background: var(--border);
    border-radius: 10px;
    padding: 1px 6px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .user-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success);
    flex-shrink: 0;
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name-text { font-weight: 600; font-size: 12px; }
  .user-status-text { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .sidebar-scroll {
    overflow-y: auto;
    flex: 1;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* ── Main area ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .chat-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .chat-room-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent)33, var(--accent2)33);
    border: 1px solid var(--accent)44;
    display: grid; place-items: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .chat-room-info { flex: 1; }
  .chat-room-name { font-size: 15px; font-weight: 700; }
  .chat-room-topic { font-size: 12px; color: var(--muted); }

  .header-actions { display: flex; gap: 8px; }
  .header-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    padding: 6px 12px;
    transition: all var(--transition);
    font-family: var(--font-ui);
  }
  .header-btn:hover { background: var(--border); color: var(--text); }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg-group { display: flex; flex-direction: column; margin-top: 12px; }
  .msg-group:first-child { margin-top: 0; }

  .msg-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .msg-row.me { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: grid; place-items: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    align-self: flex-end;
    color: #fff;
  }

  .msg-bubble {
    max-width: 65%;
    background: var(--bubble-them);
    border-radius: 14px 14px 14px 4px;
    padding: 9px 14px;
    font-size: 13.5px;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg-row.me .msg-bubble {
    background: var(--bubble-me);
    border-radius: 14px 14px 4px 14px;
  }

  .msg-sender {
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 3px;
    padding: 0 2px;
  }
  .msg-row.me .msg-sender { text-align: right; color: var(--accent-text); }

  .msg-ts {
    font-size: 9px;
    color: var(--muted);
    margin-top: 3px;
    padding: 0 4px;
  }
  .msg-row.me .msg-ts { text-align: right; }

  /* System messages */
  .msg-system {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 6px 16px;
    background: var(--surface);
    border-radius: 20px;
    margin: 8px auto;
    max-width: 80%;
    border: 1px solid var(--border);
    white-space: pre-line;
    line-height: 1.6;
  }

  /* Status broadcast */
  .msg-status-broadcast {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--status-bg);
    border: 1px solid var(--status-border);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin: 8px 0;
  }
  .msg-status-broadcast .sb-icon { font-size: 18px; }
  .msg-status-broadcast .sb-text { font-size: 12px; color: var(--success); line-height: 1.4; }
  .msg-status-broadcast .sb-user { font-weight: 700; }

  /* PM */
  .msg-pm {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--pm-bg);
    border: 1px solid var(--accent2)44;
    border-radius: var(--radius);
    padding: 10px 14px;
    margin: 6px 0;
  }
  .msg-pm .pm-icon { font-size: 16px; }
  .msg-pm .pm-text { font-size: 12.5px; color: var(--pm-text); line-height: 1.5; }
  .msg-pm .pm-sender { font-weight: 700; color: var(--accent2); }

  /* History msg */
  .msg-history {
    opacity: 0.6;
    font-style: italic;
  }

  /* ── Input bar ── */
  .input-bar {
    position: relative;
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
  }

  #msg-input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    resize: none;
    max-height: 100px;
    transition: border-color var(--transition);
  }
  #msg-input:focus { border-color: var(--accent); }
  #msg-input::placeholder { color: var(--muted); }

  .send-btn {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius);
    color: #fff;
    cursor: pointer;
    display: grid; place-items: center;
    font-size: 16px;
    transition: opacity var(--transition), transform var(--transition);
    flex-shrink: 0;
  }
  .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.96); }


  /* Perbaikan wrapping bubble */
  .msg-row > div:last-child {
    min-width: 0;
    max-width: 65%;
  }
  .msg-row.me > div:last-child { text-align: right; }
  .msg-row.me .msg-ts { text-align: right; }
  .msg-group:has(.msg-row.me) .msg-sender { align-self: flex-end; }
  .msg-bubble {
    max-width: none;
    width: fit-content;
    overflow-wrap: anywhere;
    word-break: normal;
    white-space: pre-wrap;
  }

  /* Voice message */
  .voice-btn {
    width: 40px;
    height: 40px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--panel);
    color: var(--muted);
    cursor: pointer;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    font-size: 17px;
    transition: all var(--transition);
  }
  .voice-btn:hover { color: var(--text); background: var(--border); }
  .voice-btn.recording {
    color: white;
    border-color: #ef4444;
    background: #ef4444;
    animation: recordingPulse 1s infinite;
  }
  @keyframes recordingPulse {
    0%, 100% { box-shadow: 0 0 0 0 #ef444455; }
    50% { box-shadow: 0 0 0 7px #ef444400; }
  }
  .recording-status {
    display: none;
    min-width: 72px;
    color: #f87171;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
  }
  .recording-status.active { display: inline; }
  .msg-voice-bubble {
    min-width: 245px;
    max-width: 360px;
    background: var(--bubble-them);
    border-radius: 14px 14px 14px 4px;
    padding: 10px 12px;
  }
  .msg-row.me .msg-voice-bubble {
    background: var(--bubble-me);
    border-radius: 14px 14px 4px 14px;
  }
  .msg-voice-label {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 6px;
    color: var(--muted);
    font-size: 10px;
  }
  .msg-voice-bubble audio {
    display: block;
    width: 100%;
    height: 34px;
  }
  .msg-voice-history { opacity: .65; }

  /* File transfer */
  .composer-tool-btn {
    width: 40px;
    height: 40px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--panel);
    color: var(--muted);
    cursor: pointer;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    font-size: 17px;
    transition: all var(--transition);
  }
  .composer-tool-btn:hover, .composer-tool-btn.active {
    color: var(--text);
    background: var(--border);
  }
  .emoji-picker {
    display: none;
    position: absolute;
    left: 60px;
    bottom: 62px;
    z-index: 30;
    width: 248px;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    box-shadow: 0 12px 35px var(--shadow);
    grid-template-columns: repeat(6, 1fr);
    gap: 5px;
  }
  .emoji-picker.open { display: grid; }
  .emoji-picker button {
    height: 32px;
    border: 0;
    border-radius: 7px;
    background: transparent;
    cursor: pointer;
    font-size: 19px;
  }
  .emoji-picker button:hover { background: var(--border); }
  .msg-file-bubble {
    min-width: 250px;
    max-width: 380px;
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 11px 12px;
    border: 1px solid var(--border);
    border-radius: 14px 14px 14px 4px;
    background: var(--bubble-them);
  }
  .msg-row.me .msg-file-bubble {
    border-radius: 14px 14px 4px 14px;
    background: var(--bubble-me);
  }
  .file-icon {
    width: 38px;
    height: 38px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    border-radius: 9px;
    background: var(--glass);
    font-size: 20px;
  }
  .file-meta { min-width: 0; flex: 1; }
  .file-name {
    overflow: hidden;
    color: var(--text);
    font-size: 12.5px;
    font-weight: 700;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .file-size { margin-top: 2px; color: var(--muted); font-size: 10px; }
  .file-download {
    flex-shrink: 0;
    padding: 6px 9px;
    border: 1px solid var(--glass-border);
    border-radius: 7px;
    color: white;
    background: var(--glass);
    font-size: 11px;
    text-decoration: none;
  }
  .file-download:hover { background: color-mix(in srgb, var(--accent) 18%, transparent); }
  .msg-file-history { opacity: .65; }

  /* Emoji reactions */
  .reaction-bar {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
    min-height: 20px;
    margin-top: 4px;
  }
  .msg-row.me .reaction-bar { justify-content: flex-end; }
  .reaction-chip, .reaction-add, .reaction-option {
    height: 22px;
    padding: 1px 6px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--panel);
    color: var(--muted);
    cursor: pointer;
    font-size: 11px;
    line-height: 1;
  }
  .reaction-chip:hover, .reaction-add:hover, .reaction-option:hover {
    color: var(--text);
    border-color: var(--accent);
  }
  .reaction-chip.active {
    color: white;
    border-color: var(--accent);
    background: color-mix(in srgb, var(--accent) 20%, transparent);
  }
  .reaction-options { display: none; align-items: center; gap: 3px; }
  .reaction-options.open { display: flex; }
  .reaction-option { width: 25px; padding: 0; }

  /* Music playlist */
  .music-player {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 5px;
    border: 1px solid var(--border);
    border-radius: 9px;
    background: var(--panel);
  }
  .music-track-title {
    width: 92px;

  /* ── Responsive ── */

  /* ── Final chat layout fix: prevents one-letter-per-line bubbles ── */

  /* ── Logo and theme toggle ── */

</style>

<body>

<!-- ── Login ── -->

<script>
// ── State ──────────────────────────────────────────────────────────────
let ws = null;
let myUsername = '';
let currentRoom = 'lobby';
let onlineUsers = {};
let rooms = [];
let authState = 'idle';
let onlineRefreshTimer = null;
let sessionPassword = '';
let reconnectTimer = null;
let reconnectAttempts = 0;
let reconnectInProgress = false;
let allowReconnect = false;
const MAX_RECONNECT_ATTEMPTS = 8;
const WS_HOST = location.hostname || '127.0.0.1';
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${WS_HOST}:8765`;
const MAX_FILE_SIZE = 4 * 1024 * 1024;
const MESSAGE_REACTIONS = ['👍','❤️','😂','🎉','😮','😢'];
const COMPOSER_EMOJIS = ['😀','😁','😂','🤣','😊','😍','🥰','😎','🤔','😭','😡','👍','👎','👏','🙌','🙏','💪','❤️','💙','🔥','✨','🎉','✅','📚'];


// ── Theme ──────────────────────────────────────────────────────────────
function currentTheme() {
  return document.documentElement.dataset.theme === 'light' ? 'light' : 'dark';
}

function applyTheme(theme) {
  const safeTheme = theme === 'light' ? 'light' : 'dark';
  document.documentElement.dataset.theme = safeTheme;
  localStorage.setItem('studibudiTheme', safeTheme);
  updateThemeButtons();
}

function toggleTheme() {
  applyTheme(currentTheme() === 'dark' ? 'light' : 'dark');
}

function updateThemeButtons() {
  const nextLabel = currentTheme() === 'dark' ? '☀️ Light' : '🌙 Dark';
  ['login-theme-btn', 'app-theme-btn'].forEach(id => {
    const button = document.getElementById(id);
    if (button) button.textContent = nextLabel;
  });
}

updateThemeButtons();

// ── Login and reconnection ─────────────────────────────────────────────
function setLoginStatus(message, className = '') {
  const element = document.getElementById('login-status');
  element.textContent = message;
  element.className = className;
}

function resetLoginButton() {
  document.getElementById('login-btn').disabled = false;
}

function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value.trim();
  if (!username || !password) {
    setLoginStatus('Username dan password wajib diisi.', 'error');
    return;
  }

  document.getElementById('login-btn').disabled = true;
  setLoginStatus('Menghubungkan ke server…');
  myUsername = username;
  sessionPassword = password;
  allowReconnect = false;
  reconnectAttempts = 0;
  connectAndAuthenticate(false);
}

function connectAndAuthenticate(isReconnect = false) {
  if (!myUsername || !sessionPassword) return;
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;

  reconnectInProgress = isReconnect;
  authState = 'idle';

  try {
    ws = new WebSocket(WS_URL);
  } catch (_) {
    handleConnectionFailure(isReconnect, 'Alamat WebSocket tidak valid.');
    return;
  }

  ws.onopen = () => {
    if (isReconnect) appendSystem('🔄 Terhubung ke server, melakukan login ulang…');
    else setLoginStatus('Terhubung. Melakukan autentikasi…', 'ok');
  };

  ws.onerror = () => {
    if (!isReconnect) {
      setLoginStatus('Gagal terhubung. Pastikan ws_bridge.py berjalan.', 'error');
      resetLoginButton();
    }
  };

  ws.onclose = event => {
    if (authState !== 'done') {
      if (!isReconnect) resetLoginButton();
      else scheduleReconnect(`Login ulang gagal (kode ${event.code || '-'}).`);
    }
  };

  ws.onmessage = event => {
    let packet;
    try { packet = JSON.parse(event.data); }
    catch (_) { return; }

    const type = packet.type;
    const payload = packet.payload || {};
    const textValue = payload.text || '';

    if (authState === 'idle' && type === 'prompt' && textValue.toLowerCase().includes('username')) {
      authState = 'username';
      sendRaw(myUsername);
      return;
    }
    if (authState === 'username' && type === 'prompt' && textValue.toLowerCase().includes('password')) {
      authState = 'password';
      sendRaw(sessionPassword);
      return;
    }
    if (authState === 'password' && type === 'auth_result') {
      if (!payload.success) {
        const message = payload.message || 'Login gagal.';
        if (isReconnect) {
          // Cleanup username di server kadang memerlukan jeda singkat.
          try { ws.close(); } catch (_) {}
          scheduleReconnect(message);
        } else {
          setLoginStatus(message, 'error');
          resetLoginButton();
          allowReconnect = false;
          try { ws.close(); } catch (_) {}
        }
        return;
      }

      authState = 'done';
      reconnectAttempts = 0;
      reconnectInProgress = false;
      allowReconnect = true;
      if (!isReconnect) setLoginStatus(payload.message || 'Login berhasil.', 'ok');
      enterApp(isReconnect);
    }
  };
}

function enterApp(isReconnect = false) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('me-name').textContent = myUsername;
  document.getElementById('conn-dot').classList.add('connected');
  document.getElementById('reconnect-btn').style.display = 'none';

  ws.onmessage = handleMessage;

  if (!isReconnect) {
    onlineUsers = { [myUsername]: 'Belum set status belajar' };
    renderUsers();
  } else {
    appendSystem('✅ Tersambung kembali ke server.');
  }

  const roomBeforeReconnect = currentRoom;
  const refreshInitialData = () => {
    sendCmd('/rooms');
    sendCmd('/online');
  };
  refreshInitialData();
  setTimeout(refreshInitialData, 300);
  setTimeout(refreshInitialData, 1000);

  // Setelah koneksi ulang, server menempatkan user di lobby. Coba masuk lagi
  // ke room sebelumnya bila room tersebut masih tersedia.
  if (isReconnect && roomBeforeReconnect && roomBeforeReconnect !== 'lobby') {
    setTimeout(() => sendCmd('/join ' + roomBeforeReconnect), 500);
  }

  if (onlineRefreshTimer) clearInterval(onlineRefreshTimer);
  onlineRefreshTimer = setInterval(() => sendCmd('/online'), 10000);

  ws.onclose = event => handleUnexpectedDisconnect(event);
}

function handleUnexpectedDisconnect(event) {
  if (onlineRefreshTimer) {
    clearInterval(onlineRefreshTimer);
    onlineRefreshTimer = null;
  }
  document.getElementById('conn-dot').classList.remove('connected');
  document.getElementById('reconnect-btn').style.display = '';

  const code = event?.code ? ` (kode ${event.code})` : '';
  appendSystem(`❌ Terputus dari server${code}. Mencoba menyambung kembali…`);
  if (allowReconnect) scheduleReconnect();
}

function handleConnectionFailure(isReconnect, message) {
  if (isReconnect) scheduleReconnect(message);
  else {
    setLoginStatus(message, 'error');
    resetLoginButton();
  }
}

function scheduleReconnect(reason = '') {
  if (!allowReconnect || reconnectTimer) return;
  if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
    appendSystem('⚠️ Sambungan otomatis gagal. Jalankan kembali server lalu klik “Sambungkan”.');
    document.getElementById('reconnect-btn').style.display = '';
    return;
  }

  reconnectAttempts += 1;
  const delay = Math.min(1500 * reconnectAttempts, 8000);
  if (reason) appendSystem(`🔄 ${reason} Mencoba lagi dalam ${Math.ceil(delay / 1000)} detik…`);
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    connectAndAuthenticate(true);
  }, delay);
}

function reconnectNow() {
  if (!myUsername || !sessionPassword) {
    location.reload();
    return;
  }
  if (reconnectTimer) {
    clearTimeout(reconnectTimer);
    reconnectTimer = null;
  }
  reconnectAttempts = 0;
  allowReconnect = true;
  document.getElementById('reconnect-btn').style.display = 'none';
  appendSystem('🔌 Menyambungkan kembali ke server…');
  connectAndAuthenticate(true);
}

// ── WebSocket helpers ──────────────────────────────────────────────────
function sendPacket(type, payload) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return false;
  try {
    ws.send(JSON.stringify({ type, payload }) + '\n');
    return true;
  } catch (_) {
    return false;
  }
}

function sendRaw(textValue) {
  return sendPacket('input', { text: textValue });
}

function sendCmd(command) {
  return sendRaw(command);
}

// ── Message handler ────────────────────────────────────────────────────
function handleMessage(event) {
  let packet;
  try { packet = JSON.parse(event.data); }
  catch (_) {
    appendSystem('⚠️ Pesan server tidak dapat dibaca.');
    return;
  }

  const type = packet.type;
  const payload = packet.payload || {};

  if (type === 'system') {
    appendSystem(payload.text || '');
  } else if (type === 'room_joined') {
    setCurrentRoom(payload.room || packet.room || 'lobby', payload.topic || '');
    appendSystem(payload.text || 'Berhasil berpindah room.');
    sendCmd('/rooms');
    sendCmd('/online');
  } else if (type === 'chat') {
    const sender = packet.sender || payload.sender || 'Unknown';
    appendChat(sender, payload.text || '', payload.timestamp || packet.timestamp || '', sender === myUsername, payload.message_id || '', payload.reactions || {});
  } else if (type === 'history') {
    appendChatHistory(payload.sender || packet.sender || 'Unknown', payload.text || '', payload.timestamp || packet.timestamp || '', payload.message_id || '', payload.reactions || {});
  } else if (type === 'voice') {
    appendVoiceMessage(
      packet.sender || 'Unknown',
      payload.audio || '',
      payload.mime_type || 'audio/webm',
      Number(payload.duration_ms) || 0,
      payload.timestamp || packet.timestamp || '',
      packet.sender === myUsername,
      Boolean(payload.history),
      payload.message_id || '',
      payload.reactions || {}
    );
  } else if (type === 'file') {
    appendFileMessage(
      packet.sender || 'Unknown',
      payload.filename || 'file',
      payload.mime_type || 'application/octet-stream',
      payload.data || '',
      Number(payload.size) || 0,
      payload.timestamp || packet.timestamp || '',
      packet.sender === myUsername,
      Boolean(payload.history),
      payload.message_id || '',
      payload.reactions || {}
    );
  } else if (type === 'reaction_update') {
    updateMessageReactions(payload.message_id || '', payload.reactions || {});
  } else if (type === 'pm') {
    appendPM(payload.sender || packet.sender || 'Unknown', payload.text || '', payload.timestamp || packet.timestamp || '');
  } else if (type === 'rooms') {
    rooms = Array.isArray(payload.rooms) ? payload.rooms : [];
    renderRooms();
    refreshCurrentRoomHeader();
  } else if (type === 'online_users') {
    onlineUsers = {};
    (Array.isArray(payload.users) ? payload.users : []).forEach(user => {
      if (user && user.username) onlineUsers[user.username] = user.status || '(no status)';
    });
    renderUsers();
  } else if (type === 'status_update') {
    const username = payload.username;
    if (!username) return;
    onlineUsers[username] = payload.status || '(no status)';
    renderUsers();
    appendStatusBroadcast(username, payload.status || '(no status)', payload.timestamp || packet.timestamp || '');
    if (username === myUsername) {
      document.getElementById('me-status-display').textContent = '📚 ' + payload.status;
    }
  }
}

// ── Rendering ──────────────────────────────────────────────────────────
const messagesEl = document.getElementById('messages');

function scrollBottom() {
  setTimeout(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }, 10);
}

function esc(value) {
  return String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function avatarColor(sender) {
  const colors = ['#e74c3c','#e67e22','#2ecc71','#1abc9c','#9b59b6','#3498db'];
  const index = [...String(sender)].reduce((sum, character) => sum + character.charCodeAt(0), 0) % colors.length;
  return colors[index];
}

function createMessageShell(sender, isMe, messageId = '') {
  const group = document.createElement('div');
  group.className = 'msg-group' + (isMe ? ' me-group' : '');
  if (messageId) group.dataset.messageId = messageId;

  const senderElement = document.createElement('div');
  senderElement.className = 'msg-sender';
  senderElement.textContent = isMe ? 'Kamu' : sender;

  const row = document.createElement('div');
  row.className = 'msg-row' + (isMe ? ' me' : '');

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = (sender || '?')[0].toUpperCase();
  avatar.style.background = isMe ? 'linear-gradient(135deg,var(--accent),var(--accent2))' : avatarColor(sender);

  const content = document.createElement('div');
  content.className = 'msg-content';
  row.appendChild(avatar);

function appendChatHistory(sender, text, timestamp, messageId = '', reactions = {}) {

function appendVoiceMessage(sender, audioBase64, mimeType, durationMs, timestamp, isMe, isHistory, messageId = '', reactions = {}) {

  audio.controls = true;
  audio.preload = 'metadata';
  audio.src = `data:${mimeType};base64,${audioBase64}`;

  time.className = 'msg-ts';

function appendFileMessage(sender, filename, mimeType, dataBase64, size, timestamp, isMe, isHistory, messageId = '', reactions = {}) {
  if (!dataBase64) return;
  const shell = createMessageShell(sender, isMe, messageId);
  if (isHistory) shell.group.classList.add('msg-file-history');

  const bubble = document.createElement('div');
  bubble.className = 'msg-file-bubble';

  const icon = document.createElement('div');
  icon.className = 'file-icon';
  icon.textContent = fileIconForMime(mimeType, filename);

  const meta = document.createElement('div');
  meta.className = 'file-meta';
  const name = document.createElement('div');
  name.className = 'file-name';
  name.textContent = filename;
  name.title = filename;
  const sizeElement = document.createElement('div');
  sizeElement.className = 'file-size';
  sizeElement.textContent = `${formatFileSize(size)}${isHistory ? ' · riwayat' : ''}`;
  meta.appendChild(name);
  meta.appendChild(sizeElement);

  const download = document.createElement('a');
  download.className = 'file-download';
  download.href = `data:${mimeType};base64,${dataBase64}`;
  download.download = filename;
  download.textContent = 'Unduh';

  const time = document.createElement('div');
  time.className = 'msg-ts';
  time.textContent = timestamp ? timestamp.slice(11, 16) : '';

  bubble.appendChild(icon);
  bubble.appendChild(meta);
  bubble.appendChild(download);
  shell.content.appendChild(bubble);
  shell.content.appendChild(time);
  if (messageId) attachReactionControls(shell.content, messageId, reactions);
  messagesEl.appendChild(shell.group);
  scrollBottom();
}

function fileIconForMime(mimeType, filename) {
  if (mimeType.startsWith('image/')) return '🖼️';
  if (mimeType.startsWith('audio/')) return '🎵';
  if (mimeType.startsWith('video/')) return '🎬';
  if (mimeType.includes('pdf')) return '📕';
  if (/\.(zip|rar|7z)$/i.test(filename)) return '🗜️';
  if (/\.(doc|docx|odt)$/i.test(filename)) return '📘';
  if (/\.(xls|xlsx|csv)$/i.test(filename)) return '📊';
  return '📎';
}

function formatFileSize(bytes) {
  const value = Number(bytes) || 0;
  if (value < 1024) return `${value} B`;
  if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)} KB`;
  return `${(value / (1024 * 1024)).toFixed(2)} MB`;
}

function attachReactionControls(content, messageId, reactions = {}) {
  const bar = document.createElement('div');
  bar.className = 'reaction-bar';
  bar.dataset.messageId = messageId;
  content.appendChild(bar);
  renderReactionBar(bar, reactions);
}

function renderReactionBar(bar, reactions = {}) {
  const messageId = bar.dataset.messageId;
  bar.innerHTML = '';

  Object.entries(reactions).forEach(([emoji, users]) => {
    const names = Array.isArray(users) ? users : [];
    if (!names.length) return;
    const button = document.createElement('button');
    button.className = 'reaction-chip' + (names.includes(myUsername) ? ' active' : '');
    button.textContent = `${emoji} ${names.length}`;
    button.title = names.join(', ');
    button.onclick = () => sendReaction(messageId, emoji);
    bar.appendChild(button);
  });

  const addButton = document.createElement('button');
  addButton.className = 'reaction-add';
  addButton.textContent = '＋😊';
  addButton.title = 'Tambahkan reaction';
  bar.appendChild(addButton);

  const options = document.createElement('span');
  options.className = 'reaction-options';
  MESSAGE_REACTIONS.forEach(emoji => {
    const option = document.createElement('button');
    option.className = 'reaction-option';
    option.textContent = emoji;
    option.onclick = () => sendReaction(messageId, emoji);
    options.appendChild(option);
  });
  addButton.onclick = () => options.classList.toggle('open');
  bar.appendChild(options);
}

function updateMessageReactions(messageId, reactions) {
  if (!messageId) return;
  document.querySelectorAll('.reaction-bar').forEach(bar => {
    if (bar.dataset.messageId === messageId) renderReactionBar(bar, reactions);
  });
}

function sendReaction(messageId, emoji) {

  input.focus();

async function handleSelectedFile(event) {
  const input = event.target;
  const file = input.files?.[0];
  input.value = '';
  if (!file) return;

  if (file.size <= 0) {
    appendSystem('File kosong tidak dapat dikirim.');
    return;
  }
  if (file.size > MAX_FILE_SIZE) {
    appendSystem('File terlalu besar. Maksimal 4 MB.');
    return;
  }
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    appendSystem('File gagal dikirim karena koneksi server terputus.');
    return;
  }

  appendSystem(`Mengirim file ${file.name} (${formatFileSize(file.size)})…`);
  try {
    const data = await blobToBase64(file);
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      appendSystem('File selesai diproses, tetapi koneksi sudah terputus. Sambungkan kembali lalu kirim ulang.');
      return;
    }
    const sent = sendPacket('file_input', {
      filename: file.name,
      mime_type: file.type || 'application/octet-stream',
      size: file.size,
      data
    });
    if (!sent) {
      appendSystem('File gagal dikirim karena koneksi terputus. Sambungkan kembali lalu kirim ulang.');
    } else {
      appendSystem('File sedang diunggah ke server. Tunggu sampai bubble file muncul sebagai konfirmasi.');
    }
  } catch (error) {
    appendSystem('File gagal diproses: ' + (error?.message || 'unknown error'));
  }
}

});

// ── Voice message recorder ─────────────────────────────────────────────
let mediaRecorder = null;
let microphoneStream = null;
let voiceChunks = [];
let recordingStartedAt = 0;
let recordingTimer = null;
let recordingAutoStop = null;
const MAX_RECORDING_SECONDS = 60;

function getSupportedVoiceMimeType() {
  const candidates = [
    'audio/webm;codecs=opus',
    'audio/webm',
    'audio/ogg;codecs=opus',
    'audio/mp4'
  ];
  if (!window.MediaRecorder) return '';
  return candidates.find(type => MediaRecorder.isTypeSupported(type)) || '';
}

async function toggleVoiceRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    stopVoiceRecording();
  } else {
    await startVoiceRecording();
  }
}

async function startVoiceRecording() {
  if (!navigator.mediaDevices?.getUserMedia || !window.MediaRecorder) {
    appendSystem('Browser ini tidak mendukung perekaman voice message.');
    return;
  }
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    appendSystem('Tidak dapat merekam karena koneksi server terputus.');
    return;
  }

  try {
    microphoneStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      }
    });

    const mimeType = getSupportedVoiceMimeType();
    mediaRecorder = mimeType
      ? new MediaRecorder(microphoneStream, { mimeType, audioBitsPerSecond: 64000 })
      : new MediaRecorder(microphoneStream);

    voiceChunks = [];
    mediaRecorder.ondataavailable = event => {
      if (event.data && event.data.size > 0) voiceChunks.push(event.data);
    };
    mediaRecorder.onerror = () => {
      appendSystem('Terjadi kesalahan saat merekam voice message.');
      resetVoiceRecorder();
    };
    mediaRecorder.onstop = sendRecordedVoice;

    mediaRecorder.start(250);
    recordingStartedAt = Date.now();
    setRecordingUi(true);
    updateRecordingTimer();
    recordingTimer = setInterval(updateRecordingTimer, 500);
    recordingAutoStop = setTimeout(stopVoiceRecording, MAX_RECORDING_SECONDS * 1000);
  } catch (error) {
    if (error?.name === 'NotAllowedError') {
      appendSystem('Izin mikrofon ditolak. Izinkan mikrofon pada browser lalu coba lagi.');
    } else {
      appendSystem('Mikrofon tidak dapat digunakan: ' + (error?.message || 'unknown error'));
    }
    resetVoiceRecorder();
  }
}

function stopVoiceRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

async function sendRecordedVoice() {
  const durationMs = Math.min(Date.now() - recordingStartedAt, MAX_RECORDING_SECONDS * 1000);
  const mimeType = mediaRecorder?.mimeType || voiceChunks[0]?.type || 'audio/webm';
  const blob = new Blob(voiceChunks, { type: mimeType });
  setRecordingUi(false, 'Mengirim…');

  try {
    if (blob.size === 0) {
      appendSystem('Rekaman kosong dan tidak dikirim.');
      return;
    }
    const audio = await blobToBase64(blob);
    const sent = sendPacket('voice_input', {
      audio,
      mime_type: blob.type || mimeType,
      duration_ms: durationMs
    });
    if (!sent) appendSystem('Voice message gagal dikirim karena koneksi terputus.');
  } catch (error) {
    appendSystem('Voice message gagal diproses: ' + (error?.message || 'unknown error'));
  } finally {
    resetVoiceRecorder();
  }
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => {
      const result = String(reader.result || '');
      resolve(result.includes(',') ? result.split(',', 2)[1] : result);
    };
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function setRecordingUi(recording, customText = '') {
  const button = document.getElementById('voice-btn');
  const status = document.getElementById('recording-status');
  button.classList.toggle('recording', recording);
  button.textContent = recording ? '⏹' : '🎙️';
  button.title = recording ? 'Stop dan kirim voice message' : 'Rekam voice message';
  status.classList.toggle('active', recording || Boolean(customText));
  if (customText) status.textContent = customText;
}

function updateRecordingTimer() {
  const elapsed = Math.min(Math.floor((Date.now() - recordingStartedAt) / 1000), MAX_RECORDING_SECONDS);
  document.getElementById('recording-status').textContent = `REC ${formatDuration(elapsed)}`;
}

function formatDuration(totalSeconds) {
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
}

function resetVoiceRecorder() {
  clearInterval(recordingTimer);
  clearTimeout(recordingAutoStop);
  recordingTimer = null;
  recordingAutoStop = null;
  if (microphoneStream) microphoneStream.getTracks().forEach(track => track.stop());
  microphoneStream = null;
  mediaRecorder = null;
  voiceChunks = [];
  setRecordingUi(false);
  document.getElementById('recording-status').classList.remove('active');
}

// ── Lofi playlist ──────────────────────────────────────────────────────
const lofiAudio = document.getElementById('lofi-audio');
const musicPlayButton = document.getElementById('music-play-btn');
const musicTrackTitle = document.getElementById('music-track-title');
const lofiPlaylist = [
  { title: 'tokyo-music', base: 'assets/tokyo-music' },
  { title: 'Late-at-Night', base: 'assets/Late-at-Night' },
  { title: 'echoes-in-blue', base: 'assets/echoes-in-blue' },
  { title: 'Heart-Of-The-Ocean', base: 'assets/Heart-Of-The-Ocean' }
];
const audioExtensions = ['mp3','wav','m4a','ogg','aac','flac'];
let currentTrackIndex = 0;
let currentExtensionIndex = 0;
let shouldAutoplayMusic = false;
let failedTrackCount = 0;

function currentTrackSource() {
  return `${lofiPlaylist[currentTrackIndex].base}.${audioExtensions[currentExtensionIndex]}`;
}
function updateTrackTitle() { musicTrackTitle.textContent = lofiPlaylist[currentTrackIndex].title; }
function loadCurrentTrack(autoplay = false) {
  shouldAutoplayMusic = autoplay;
  currentExtensionIndex = 0;
  updateTrackTitle();
  lofiAudio.src = currentTrackSource();
  lofiAudio.load();
}
async function toggleMusic() {
  if (lofiAudio.paused) {
    try { await lofiAudio.play(); } catch (_) {}
  } else lofiAudio.pause();
}
function stopMusic() {
  shouldAutoplayMusic = false;
  lofiAudio.pause();
  try { lofiAudio.currentTime = 0; } catch (_) {}
}
function nextTrack(autoplay = !lofiAudio.paused) {
  currentTrackIndex = (currentTrackIndex + 1) % lofiPlaylist.length;
  loadCurrentTrack(autoplay);
}
function previousTrack(autoplay = !lofiAudio.paused) {
  currentTrackIndex = (currentTrackIndex - 1 + lofiPlaylist.length) % lofiPlaylist.length;
  loadCurrentTrack(autoplay);
}
function setMusicVolume(value) {
  lofiAudio.volume = Math.max(0, Math.min(1, Number(value)));
  localStorage.setItem('studibudiMusicVolume', String(lofiAudio.volume));
}
lofiAudio.addEventListener('play', () => { musicPlayButton.textContent = '⏸'; });
lofiAudio.addEventListener('pause', () => { musicPlayButton.textContent = '▶'; });
lofiAudio.addEventListener('ended', () => nextTrack(true));
lofiAudio.addEventListener('loadedmetadata', () => {
  failedTrackCount = 0;
  if (shouldAutoplayMusic) lofiAudio.play().catch(() => {});
});
lofiAudio.addEventListener('error', () => {
  if (currentExtensionIndex < audioExtensions.length - 1) {
    currentExtensionIndex += 1;
    lofiAudio.src = currentTrackSource();
    lofiAudio.load();
    return;
  }
  failedTrackCount += 1;
  if (failedTrackCount < lofiPlaylist.length) {
    currentTrackIndex = (currentTrackIndex + 1) % lofiPlaylist.length;
    loadCurrentTrack(shouldAutoplayMusic);
  }
});
const savedVolume = Number(localStorage.getItem('studibudiMusicVolume'));
setMusicVolume(Number.isFinite(savedVolume) ? savedVolume : 0.25);
document.getElementById('music-volume').value = String(lofiAudio.volume);
loadCurrentTrack(false);
